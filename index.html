<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Household Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">🏠 Household Manager</span>
  </nav>

  <div class="container my-4">
    <div class="row g-4">

      <!-- Ausgabe erfassen -->
      <div class="col-md-5">
        <div class="card shadow-sm">
          <div class="card-header bg-dark text-white fw-semibold">Ausgabe erfassen</div>
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label">Artikel</label>
              <input type="text" class="form-control" placeholder="z.B. Milch" />
            </div>
            <div class="mb-3">
              <label class="form-label">Betrag (€)</label>
              <input type="number" class="form-control" placeholder="0.00" />
            </div>
            <div class="mb-3">
              <label class="form-label">Kategorie</label>
              <select class="form-select">
                <option>Lebensmittel</option>
                <option>Hygiene</option>
                <option>Haushalt</option>
                <option>Sonstiges</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Bezahlt von</label>
              <input type="text" class="form-control" placeholder="Name" />
            </div>
            <button class="btn btn-dark w-100">Hinzufügen</button>
          </div>
        </div>
      </div>

      <!-- Inventar -->
      <div class="col-md-7">
        <div class="card shadow-sm">
          <div class="card-header bg-dark text-white fw-semibold">Inventar</div>
          <div class="card-body p-0">
            <table class="table table-hover mb-0">
              <thead class="table-secondary">
                <tr>
                  <th>Artikel</th>
                  <th>Kategorie</th>
                  <th>Menge</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Milch</td>
                  <td>Lebensmittel</td>
                  <td>2</td>
                  <td><span class="badge bg-success">Verfügbar</span></td>
                </tr>
                <tr>
                  <td>Salz</td>
                  <td>Lebensmittel</td>
                  <td>0</td>
                  <td><span class="badge bg-danger">Leer</span></td>
                </tr>
                <tr>
                  <td>Shampoo</td>
                  <td>Hygiene</td>
                  <td>1</td>
                  <td><span class="badge bg-warning text-dark">Niedrig</span></td>
                </tr>
                <tr>
                  <td>Nudeln</td>
                  <td>Lebensmittel</td>
                  <td>3</td>
                  <td><span class="badge bg-success">Verfügbar</span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Warnung -->
        <div class="alert alert-danger mt-3 mb-0" role="alert">
          ⚠️ <strong>Salz</strong> ist aufgebraucht – bitte nachkaufen!
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
